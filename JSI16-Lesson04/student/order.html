<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý đơn hàng — MindX Coffee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./src/css/main.css">
  <link rel="stylesheet" href="./src/css/guest.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="py-3">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="logo">
          <a href="./index.html"><img src="./src/img/logo.png" alt="MindX Coffee"></a>
        </div>
        <ul class="nav align-items-center">
          <li class="nav-item"><a class="nav-link text-white" href="./index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="./order.html">Đơn hàng</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="./balance.html">Ví điện tử</a></li>
          <li class="nav-item">
            <div class="profile">
              <button class="dropdown-toggle" type="button" id="profile-dropdown"
                data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fa-light fa-user icon"></i>
              </button>
              <ul id="author-menu-drd" class="dropdown-menu" aria-labelledby="profile-dropdown">
                <li><a class="dropdown-item" href="./login.html">Đăng nhập</a></li>
                <li><a class="dropdown-item" href="./register.html">Đăng ký</a></li>
              </ul>
            </div>
          </li>
        </ul>
      </div>
    </header>

    <div class="container page-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Quản lý đơn hàng</h2>
        <button class="btn btn-primary" onclick="document.getElementById('orderFormModal').style.display='block'">
          <i class="fa-light fa-plus me-1"></i> Đặt đồ uống
        </button>
      </div>

      <div class="table-responsive shadow-md rounded-md">
        <table class="table table-hover mb-0">
          <thead class="bg-primary text-white">
            <tr>
              <th>Tên món</th>
              <th>Giá</th>
              <th>Số lượng</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="orderTableBody">
            <tr>
              <td colspan="5" class="text-center text-muted">Đang tải...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal form đặt đồ uống -->
  <div class="order-form" id="orderFormModal">
    <div class="content rounded-md p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Đặt đồ uống</h4>
        <button class="btn btn-cancle" onclick="document.getElementById('orderFormModal').style.display='none'">
          <i class="fa-light fa-xmark"></i>
        </button>
      </div>
      <img src="./src/img/matcha_latte.png" alt="Đồ uống" class="rounded-md mb-3">
      <div class="mb-3">
        <label class="form-label fw-bold">Tên món</label>
        <input type="text" id="productName" class="form-control" value="Matcha Latte">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Giá (VNĐ)</label>
        <input type="number" id="productPrice" class="form-control" value="55000">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Số lượng</label>
        <input type="number" id="productQuantity" class="form-control" value="1" min="1">
      </div>
      <button id="confirmOrderBtn" class="btn btn-danger w-100">Xác nhận</button>
    </div>
  </div>

  <!-- TODO Buổi 4: Thêm Firebase SDK + check_session.js + guest.js + order.js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>
</html>

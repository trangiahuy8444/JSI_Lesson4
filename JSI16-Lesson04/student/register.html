<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký — MindX Coffee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./src/css/main.css">
  <link rel="stylesheet" href="./src/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="box rounded-md">
      <h3 class="text-center mb-4">Đăng ký tài khoản</h3>
      <form id="registerForm">
        <div class="form-group d-flex align-items-center rounded-sm mb-3">
          <span class="icon"><i class="fa-light fa-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="Email" required>
        </div>
        <div class="form-group d-flex align-items-center rounded-sm mb-3">
          <span class="icon"><i class="fa-light fa-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>
        </div>
        <div class="form-group d-flex align-items-center rounded-sm mb-3">
          <span class="icon"><i class="fa-light fa-lock"></i></span>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Xác nhận mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-sm">Đăng ký</button>
      </form>

      <p class="text-center mt-3 mb-0">
        Đã có tài khoản? <a href="./login.html" class="text-primary">Đăng nhập</a>
      </p>
    </div>
  </div>

  <!-- TODO Buổi 4: Thêm Firebase SDK + firebase-config.js + register.js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>
</html>

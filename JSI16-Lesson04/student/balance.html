<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ví điện tử — MindX Coffee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./src/css/main.css">
  <link rel="stylesheet" href="./src/css/guest.css">
  <style>
    .balance-card {
      background: linear-gradient(135deg, var(--color-primary), #c0392b);
      color: white;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .balance-amount {
      font-size: 2.5rem;
      font-weight: 700;
    }
    .deposit-form {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: rgba(0,0,0,0.1) 0 4px 12px;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="py-3">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="logo">
          <a href="./index.html"><img src="./src/img/logo.png" alt="MindX Coffee"></a>
        </div>
        <ul class="nav align-items-center">
          <li class="nav-item"><a class="nav-link text-white" href="./index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="./order.html">Đơn hàng</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="./balance.html">Ví điện tử</a></li>
          <li class="nav-item">
            <div class="profile">
              <button class="dropdown-toggle" type="button" id="profile-dropdown"
                data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fa-light fa-user icon"></i>
              </button>
              <ul id="author-menu-drd" class="dropdown-menu" aria-labelledby="profile-dropdown">
                <li><a class="dropdown-item" href="./login.html">Đăng nhập</a></li>
                <li><a class="dropdown-item" href="./register.html">Đăng ký</a></li>
              </ul>
            </div>
          </li>
        </ul>
      </div>
    </header>

    <div class="container page-content">
      <h2 class="mb-4">Ví điện tử</h2>

      <div class="balance-card text-center">
        <p class="mb-1 opacity-75">Số dư hiện tại</p>
        <div class="balance-amount" id="balanceAmount">0đ</div>
      </div>

      <div class="deposit-form">
        <h4 class="mb-3">Nạp tiền vào ví</h4>
        <form id="depositForm">
          <div class="mb-3">
            <label class="form-label fw-bold">Số tiền nạp (VNĐ)</label>
            <input type="number" id="depositAmount" class="form-control" placeholder="Nhập số tiền" min="10000" step="10000">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Chọn ngân hàng</label>
            <select id="bankSelect" class="form-select">
              <option value="vcb">Vietcombank</option>
              <option value="tcb">Techcombank</option>
              <option value="mb">MB Bank</option>
              <option value="acb">ACB</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100">Xác nhận nạp tiền</button>
        </form>
      </div>
    </div>
  </div>

  <!-- TODO Buổi 4: Thêm Firebase SDK + check_session.js + guest.js + balance.js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>
</html>

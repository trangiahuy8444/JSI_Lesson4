<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — MindX Coffee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./src/css/main.css">
  <link rel="stylesheet" href="./src/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="box rounded-md">
      <h3 class="text-center mb-4">Đăng nhập</h3>
      <form id="loginForm">
        <div class="form-group d-flex align-items-center rounded-sm mb-3">
          <span class="icon"><i class="fa-light fa-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="Email" required>
        </div>
        <div class="form-group d-flex align-items-center rounded-sm mb-3">
          <span class="icon"><i class="fa-light fa-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-sm">Đăng nhập</button>
      </form>

      <div class="text-center my-3 text-muted">— hoặc —</div>

      <button id="googleLoginBtn" class="btn btn-light w-100 rounded-sm">
        <i class="fa-brands fa-google me-2"></i> Đăng nhập với Google
      </button>

      <p class="text-center mt-3 mb-0">
        Chưa có tài khoản? <a href="./register.html" class="text-primary">Đăng ký</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="./src/js/firebase-config.js"></script>
  <script src="./src/js/login.js"></script>
</body>
</html>
